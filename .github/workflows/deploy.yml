name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy hosting + functions + rules
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            functions/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Sanitize Firebase env (strip whitespace/quotes)
        env:
          RAW_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          RAW_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          RAW_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          RAW_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          RAW_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          RAW_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          RAW_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
        run: |
          # Trim leading/trailing whitespace and any wrapping quotes, then
          # export to $GITHUB_ENV so the build step inlines clean values.
          trim() {
            local v="$1"
            v="${v#"${v%%[![:space:]]*}"}"
            v="${v%"${v##*[![:space:]]}"}"
            v="${v%\"}"; v="${v#\"}"
            v="${v%\'}"; v="${v#\'}"
            printf '%s' "$v"
          }
          # Write a web/.env.production file so Vite picks up the cleaned
          # values deterministically at build time (process.env handoff via
          # $GITHUB_ENV did not consistently inline into the bundle).
          mkdir -p web
          {
            echo "VITE_FIREBASE_API_KEY=$(trim "$RAW_API_KEY")"
            echo "VITE_FIREBASE_AUTH_DOMAIN=$(trim "$RAW_AUTH_DOMAIN")"
            echo "VITE_FIREBASE_PROJECT_ID=$(trim "$RAW_PROJECT_ID")"
            echo "VITE_FIREBASE_STORAGE_BUCKET=$(trim "$RAW_STORAGE_BUCKET")"
            echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$(trim "$RAW_MESSAGING_SENDER_ID")"
            echo "VITE_FIREBASE_APP_ID=$(trim "$RAW_APP_ID")"
            echo "VITE_FIREBASE_VAPID_KEY=$(trim "$RAW_VAPID_KEY")"
          } > web/.env.production
          # Sanity check — fail fast if authDomain or apiKey are missing/malformed.
          ad="$(trim "$RAW_AUTH_DOMAIN")"
          ak="$(trim "$RAW_API_KEY")"
          if [[ -z "$ad" || "$ad" =~ [[:space:]] ]]; then
            echo "::error::VITE_FIREBASE_AUTH_DOMAIN is empty or contains whitespace after trim"
            exit 1
          fi
          if [[ -z "$ak" || "$ak" =~ [[:space:]] ]]; then
            echo "::error::VITE_FIREBASE_API_KEY is empty or contains whitespace after trim"
            exit 1
          fi
          # Log key lengths (not values) so we can verify secrets are populated.
          echo "Wrote web/.env.production with keys:"
          awk -F= '{printf "  %s = <%d chars>\n", $1, length($2)}' web/.env.production

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Write functions .env for defineString params only
        working-directory: functions
        run: |
          cat > .env <<EOF
          GOOGLE_AI_API_KEY=${{ secrets.GOOGLE_AI_API_KEY || 'placeholder' }}
          GITHUB_CLIENT_ID=${{ secrets.GH_OAUTH_CLIENT_ID || 'placeholder' }}
          GITHUB_CLIENT_SECRET=${{ secrets.GH_OAUTH_CLIENT_SECRET || 'placeholder' }}
          GITHUB_REDIRECT_URI=${{ secrets.GH_OAUTH_REDIRECT_URI || 'https://open-ten99.web.app/auth/github/callback' }}
          GITHUB_WEBHOOK_SECRET=${{ secrets.GH_WEBHOOK_SECRET || 'placeholder' }}
          POSTMARK_WEBHOOK_SECRET=${{ secrets.POSTMARK_WEBHOOK_SECRET || 'placeholder' }}
          EOF

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform,https://www.googleapis.com/auth/firebase

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy all
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          npx -y firebase-tools@13 deploy \
            --only hosting,functions,firestore \
            --project open-ten99 \
            --non-interactive --force
